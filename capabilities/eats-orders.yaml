naftiko: 1.0.0-alpha2
info:
  label: Uber Eats API — Orders
  description: 'Uber Eats API — Orders. 4 operations. Lead operation: Get Order. Self-contained Naftiko capability covering
    one Uber business surface.'
  tags:
  - Uber
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UBER_API_KEY: UBER_API_KEY
capability:
  consumes:
  - type: http
    namespace: eats-orders
    baseUri: https://api.uber.com/v1
    description: Uber Eats API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: eats-orders-order_id
      path: /eats/orders/{order_id}
      operations:
      - name: getorder
        method: GET
        description: Get Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: order_id
          in: path
          type: string
          description: Unique identifier for the order.
          required: true
    - name: eats-orders-order_id-accept_pos_order
      path: /eats/orders/{order_id}/accept_pos_order
      operations:
      - name: acceptorder
        method: POST
        description: Accept Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: order_id
          in: path
          type: string
          description: Unique identifier for the order.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: eats-orders-order_id-cancel
      path: /eats/orders/{order_id}/cancel
      operations:
      - name: cancelorder
        method: POST
        description: Cancel Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: order_id
          in: path
          type: string
          description: Unique identifier for the order.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: eats-orders-order_id-deny_pos_order
      path: /eats/orders/{order_id}/deny_pos_order
      operations:
      - name: denyorder
        method: POST
        description: Deny Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: order_id
          in: path
          type: string
          description: Unique identifier for the order.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.UBER_API_KEY}}'
  exposes:
  - type: rest
    namespace: eats-orders-rest
    port: 8080
    description: REST adapter for Uber Eats API — Orders. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/eats/orders/{order-id}
      name: eats-orders-order-id
      description: REST surface for eats-orders-order_id.
      operations:
      - method: GET
        name: getorder
        description: Get Order
        call: eats-orders.getorder
        with:
          order_id: rest.order_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eats/orders/{order-id}/accept-pos-order
      name: eats-orders-order-id-accept-pos-order
      description: REST surface for eats-orders-order_id-accept_pos_order.
      operations:
      - method: POST
        name: acceptorder
        description: Accept Order
        call: eats-orders.acceptorder
        with:
          order_id: rest.order_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eats/orders/{order-id}/cancel
      name: eats-orders-order-id-cancel
      description: REST surface for eats-orders-order_id-cancel.
      operations:
      - method: POST
        name: cancelorder
        description: Cancel Order
        call: eats-orders.cancelorder
        with:
          order_id: rest.order_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eats/orders/{order-id}/deny-pos-order
      name: eats-orders-order-id-deny-pos-order
      description: REST surface for eats-orders-order_id-deny_pos_order.
      operations:
      - method: POST
        name: denyorder
        description: Deny Order
        call: eats-orders.denyorder
        with:
          order_id: rest.order_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: eats-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Uber Eats API — Orders. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-order
      description: Get Order
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: eats-orders.getorder
      with:
        order_id: tools.order_id
      outputParameters:
      - type: object
        mapping: $.
    - name: accept-order
      description: Accept Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: eats-orders.acceptorder
      with:
        order_id: tools.order_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-order
      description: Cancel Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: eats-orders.cancelorder
      with:
        order_id: tools.order_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: deny-order
      description: Deny Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: eats-orders.denyorder
      with:
        order_id: tools.order_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
