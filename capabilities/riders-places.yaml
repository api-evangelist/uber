naftiko: 1.0.0-alpha2
info:
  label: Uber Riders API — Places
  description: 'Rides — Places. 2 operations. Lead operation: Get Saved Place. Self-contained Naftiko capability covering
    one Uber business surface.'
  tags:
  - Uber
  - Rides
  - Places
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    UBER_API_TOKEN: UBER_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: riders-places
    baseUri: https://api.uber.com/v1.2
    description: Uber Riders API — Places business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.UBER_API_TOKEN}}'
    resources:
    - name: places-place-id
      path: /places/{place_id}
      operations:
      - name: getPlace
        method: GET
        description: Get Saved Place
        inputParameters:
        - name: place_id
          in: path
          type: string
          required: true
          description: The name of the place (home or work).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: places-place-id
      path: /places/{place_id}
      operations:
      - name: updatePlace
        method: PUT
        description: Update Saved Place
        inputParameters:
        - name: place_id
          in: path
          type: string
          required: true
          description: The name of the place (home or work).
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: riders-places-rest
    port: 8080
    description: REST adapter for Uber Riders API — Places. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/places/{place-id}
      name: places-place-id
      description: REST surface for places-place-id.
      operations:
      - method: GET
        name: getPlace
        description: Get Saved Place
        call: riders-places.getPlace
        with:
          place_id: rest.place_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatePlace
        description: Update Saved Place
        call: riders-places.updatePlace
        with:
          place_id: rest.place_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: riders-places-mcp
    port: 9090
    transport: http
    description: MCP adapter for Uber Riders API — Places. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-saved-place
      description: Get Saved Place
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: riders-places.getPlace
      with:
        place_id: tools.place_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-saved-place
      description: Update Saved Place
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: riders-places.updatePlace
      with:
        place_id: tools.place_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
