naftiko: 1.0.0-alpha2
info:
  label: Uber Direct API — Deliveries
  description: 'Uber Direct API — Deliveries. 4 operations. Lead operation: Create Delivery. Self-contained Naftiko capability
    covering one Uber business surface.'
  tags:
  - Uber
  - Deliveries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UBER_API_KEY: UBER_API_KEY
capability:
  consumes:
  - type: http
    namespace: direct-deliveries
    baseUri: https://api.uber.com/v1
    description: Uber Direct API — Deliveries business capability. Self-contained, no shared references.
    resources:
    - name: eats-deliveries
      path: /eats/deliveries
      operations:
      - name: createdelivery
        method: POST
        description: Create Delivery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: eats-deliveries-quote
      path: /eats/deliveries/quote
      operations:
      - name: getdeliveryquote
        method: POST
        description: Get Delivery Quote
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: eats-deliveries-order_id
      path: /eats/deliveries/{order_id}
      operations:
      - name: getdelivery
        method: GET
        description: Get Delivery Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: order_id
          in: path
          type: string
          description: Unique identifier for the delivery order.
          required: true
      - name: canceldelivery
        method: DELETE
        description: Cancel Delivery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: order_id
          in: path
          type: string
          description: Unique identifier for the delivery order.
          required: true
    authentication:
      type: bearer
      token: '{{env.UBER_API_KEY}}'
  exposes:
  - type: rest
    namespace: direct-deliveries-rest
    port: 8080
    description: REST adapter for Uber Direct API — Deliveries. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/eats/deliveries
      name: eats-deliveries
      description: REST surface for eats-deliveries.
      operations:
      - method: POST
        name: createdelivery
        description: Create Delivery
        call: direct-deliveries.createdelivery
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eats/deliveries/quote
      name: eats-deliveries-quote
      description: REST surface for eats-deliveries-quote.
      operations:
      - method: POST
        name: getdeliveryquote
        description: Get Delivery Quote
        call: direct-deliveries.getdeliveryquote
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eats/deliveries/{order-id}
      name: eats-deliveries-order-id
      description: REST surface for eats-deliveries-order_id.
      operations:
      - method: GET
        name: getdelivery
        description: Get Delivery Status
        call: direct-deliveries.getdelivery
        with:
          order_id: rest.order_id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: canceldelivery
        description: Cancel Delivery
        call: direct-deliveries.canceldelivery
        with:
          order_id: rest.order_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: direct-deliveries-mcp
    port: 9090
    transport: http
    description: MCP adapter for Uber Direct API — Deliveries. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-delivery
      description: Create Delivery
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: direct-deliveries.createdelivery
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-delivery-quote
      description: Get Delivery Quote
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: direct-deliveries.getdeliveryquote
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-delivery-status
      description: Get Delivery Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: direct-deliveries.getdelivery
      with:
        order_id: tools.order_id
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-delivery
      description: Cancel Delivery
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: direct-deliveries.canceldelivery
      with:
        order_id: tools.order_id
      outputParameters:
      - type: object
        mapping: $.
