naftiko: 1.0.0-alpha2
info:
  label: Uber Direct API — Deliveries
  description: 'Delivery — Deliveries. 4 operations. Lead operation: Create Delivery. Self-contained Naftiko capability covering
    one Uber business surface.'
  tags:
  - Uber
  - Delivery
  - Deliveries
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    UBER_API_TOKEN: UBER_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: direct-deliveries
    baseUri: https://api.uber.com/v1
    description: Uber Direct API — Deliveries business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.UBER_API_TOKEN}}'
    resources:
    - name: eats-deliveries
      path: /eats/deliveries
      operations:
      - name: createDelivery
        method: POST
        description: Create Delivery
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: eats-deliveries-order-id
      path: /eats/deliveries/{order_id}
      operations:
      - name: getDelivery
        method: GET
        description: Get Delivery Status
        inputParameters:
        - name: order_id
          in: path
          type: string
          required: true
          description: Unique identifier for the delivery order.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: eats-deliveries-order-id
      path: /eats/deliveries/{order_id}
      operations:
      - name: cancelDelivery
        method: DELETE
        description: Cancel Delivery
        inputParameters:
        - name: order_id
          in: path
          type: string
          required: true
          description: Unique identifier for the delivery order.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: eats-deliveries-quote
      path: /eats/deliveries/quote
      operations:
      - name: getDeliveryQuote
        method: POST
        description: Get Delivery Quote
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: direct-deliveries-rest
    port: 8080
    description: REST adapter for Uber Direct API — Deliveries. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/eats/deliveries
      name: eats-deliveries
      description: REST surface for eats-deliveries.
      operations:
      - method: POST
        name: createDelivery
        description: Create Delivery
        call: direct-deliveries.createDelivery
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eats/deliveries/{order-id}
      name: eats-deliveries-order-id
      description: REST surface for eats-deliveries-order-id.
      operations:
      - method: GET
        name: getDelivery
        description: Get Delivery Status
        call: direct-deliveries.getDelivery
        with:
          order_id: rest.order_id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: cancelDelivery
        description: Cancel Delivery
        call: direct-deliveries.cancelDelivery
        with:
          order_id: rest.order_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eats/deliveries/quote
      name: eats-deliveries-quote
      description: REST surface for eats-deliveries-quote.
      operations:
      - method: POST
        name: getDeliveryQuote
        description: Get Delivery Quote
        call: direct-deliveries.getDeliveryQuote
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: direct-deliveries-mcp
    port: 9090
    transport: http
    description: MCP adapter for Uber Direct API — Deliveries. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-delivery
      description: Create Delivery
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: direct-deliveries.createDelivery
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-delivery-status
      description: Get Delivery Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: direct-deliveries.getDelivery
      with:
        order_id: tools.order_id
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-delivery
      description: Cancel Delivery
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: direct-deliveries.cancelDelivery
      with:
        order_id: tools.order_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-delivery-quote
      description: Get Delivery Quote
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: direct-deliveries.getDeliveryQuote
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
