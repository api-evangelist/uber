naftiko: 1.0.0-alpha2
info:
  label: Uber Riders API — Riders
  description: 'Rides — Riders. 3 operations. Lead operation: Get Rider Profile. Self-contained Naftiko capability covering
    one Uber business surface.'
  tags:
  - Uber
  - Rides
  - Riders
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    UBER_API_TOKEN: UBER_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: riders-riders
    baseUri: https://api.uber.com/v1.2
    description: Uber Riders API — Riders business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.UBER_API_TOKEN}}'
    resources:
    - name: me
      path: /me
      operations:
      - name: getRiderProfile
        method: GET
        description: Get Rider Profile
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: me
      path: /me
      operations:
      - name: applyPromotion
        method: PATCH
        description: Apply Promotion
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: history
      path: /history
      operations:
      - name: getRideHistory
        method: GET
        description: Get Ride History
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Number of items to retrieve. Default is 5, maximum is 50.
        - name: offset
          in: query
          type: integer
          required: false
          description: Offset the list of returned results by this amount.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: riders-riders-rest
    port: 8080
    description: REST adapter for Uber Riders API — Riders. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/me
      name: me
      description: REST surface for me.
      operations:
      - method: GET
        name: getRiderProfile
        description: Get Rider Profile
        call: riders-riders.getRiderProfile
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: applyPromotion
        description: Apply Promotion
        call: riders-riders.applyPromotion
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/history
      name: history
      description: REST surface for history.
      operations:
      - method: GET
        name: getRideHistory
        description: Get Ride History
        call: riders-riders.getRideHistory
        with:
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: riders-riders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Uber Riders API — Riders. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-rider-profile
      description: Get Rider Profile
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: riders-riders.getRiderProfile
      outputParameters:
      - type: object
        mapping: $.
    - name: apply-promotion
      description: Apply Promotion
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: riders-riders.applyPromotion
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-ride-history
      description: Get Ride History
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: riders-riders.getRideHistory
      with:
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
