naftiko: 1.0.0-alpha2
info:
  label: Uber Riders API — Riders
  description: 'Uber Riders API — Riders. 3 operations. Lead operation: Get Ride History. Self-contained Naftiko capability
    covering one Uber business surface.'
  tags:
  - Uber
  - Riders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UBER_API_KEY: UBER_API_KEY
capability:
  consumes:
  - type: http
    namespace: riders-riders
    baseUri: https://api.uber.com/v1.2
    description: Uber Riders API — Riders business capability. Self-contained, no shared references.
    resources:
    - name: history
      path: /history
      operations:
      - name: getridehistory
        method: GET
        description: Get Ride History
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Number of items to retrieve. Default is 5, maximum is 50.
        - name: offset
          in: query
          type: integer
          description: Offset the list of returned results by this amount.
    - name: me
      path: /me
      operations:
      - name: getriderprofile
        method: GET
        description: Get Rider Profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: applypromotion
        method: PATCH
        description: Apply Promotion
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.UBER_API_KEY}}'
  exposes:
  - type: rest
    namespace: riders-riders-rest
    port: 8080
    description: REST adapter for Uber Riders API — Riders. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/history
      name: history
      description: REST surface for history.
      operations:
      - method: GET
        name: getridehistory
        description: Get Ride History
        call: riders-riders.getridehistory
        with:
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/me
      name: me
      description: REST surface for me.
      operations:
      - method: GET
        name: getriderprofile
        description: Get Rider Profile
        call: riders-riders.getriderprofile
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: applypromotion
        description: Apply Promotion
        call: riders-riders.applypromotion
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: riders-riders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Uber Riders API — Riders. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-ride-history
      description: Get Ride History
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: riders-riders.getridehistory
      with:
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: get-rider-profile
      description: Get Rider Profile
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: riders-riders.getriderprofile
      outputParameters:
      - type: object
        mapping: $.
    - name: apply-promotion
      description: Apply Promotion
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: riders-riders.applypromotion
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
