naftiko: 1.0.0-alpha2
info:
  label: Uber Vouchers API — Redemption
  description: 'Vouchers — Redemption. 1 operations. Lead operation: Redeem Voucher Code. Self-contained Naftiko capability
    covering one Uber business surface.'
  tags:
  - Uber
  - Vouchers
  - Redemption
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    UBER_API_TOKEN: UBER_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: vouchers-redemption
    baseUri: https://api.uber.com/v1
    description: Uber Vouchers API — Redemption business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.UBER_API_TOKEN}}'
    resources:
    - name: me-vouchers-redeem
      path: /me/vouchers/redeem
      operations:
      - name: redeemVoucherCode
        method: POST
        description: Redeem Voucher Code
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: vouchers-redemption-rest
    port: 8080
    description: REST adapter for Uber Vouchers API — Redemption. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/me/vouchers/redeem
      name: me-vouchers-redeem
      description: REST surface for me-vouchers-redeem.
      operations:
      - method: POST
        name: redeemVoucherCode
        description: Redeem Voucher Code
        call: vouchers-redemption.redeemVoucherCode
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vouchers-redemption-mcp
    port: 9090
    transport: http
    description: MCP adapter for Uber Vouchers API — Redemption. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: redeem-voucher-code
      description: Redeem Voucher Code
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vouchers-redemption.redeemVoucherCode
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
