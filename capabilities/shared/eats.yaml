naftiko: "1.0.0-alpha1"

info:
  label: "Uber Eats API"
  description: "Marketplace API for managing stores, menus, and orders on the Uber Eats platform."
  tags:
    - Uber
    - Uber Eats
    - Food Delivery
    - Restaurants
    - Orders
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UBER_EATS_ACCESS_TOKEN: UBER_EATS_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: uber-eats
      baseUri: https://api.uber.com/v1
      description: "Uber Eats Marketplace API for store, menu, and order management."
      authentication:
        type: bearer
        token: "{{UBER_EATS_ACCESS_TOKEN}}"
      resources:
        - name: stores
          path: /eats/stores
          description: "Uber Eats store management."
          operations:
            - name: list-stores
              method: GET
              description: "Returns a list of stores for the authenticated partner."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of stores to return."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: store
          path: /eats/stores/{store_id}
          description: "Individual store operations."
          operations:
            - name: get-store
              method: GET
              description: "Returns details for a specific store."
              inputParameters:
                - name: store_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for the store."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: store-menu
          path: /eats/stores/{store_id}/menus
          description: "Store menu management."
          operations:
            - name: get-store-menu
              method: GET
              description: "Returns the current menu for a specific store."
              inputParameters:
                - name: store_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for the store."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-store-menu
              method: PUT
              description: "Replace the full menu for a specific store."
              inputParameters:
                - name: store_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for the store."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  categories: "{{tools.categories}}"

        - name: order
          path: /eats/orders/{order_id}
          description: "Individual order operations."
          operations:
            - name: get-order
              method: GET
              description: "Returns order details for a specific order ID."
              inputParameters:
                - name: order_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for the order."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: accept-order
          path: /eats/orders/{order_id}/accept_pos_order
          description: "Order acceptance."
          operations:
            - name: accept-order
              method: POST
              description: "Accept a pending order within the required acceptance window."
              inputParameters:
                - name: order_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for the order."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: deny-order
          path: /eats/orders/{order_id}/deny_pos_order
          description: "Order denial."
          operations:
            - name: deny-order
              method: POST
              description: "Deny a pending order."
              inputParameters:
                - name: order_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for the order."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  reason: "{{tools.reason}}"
