naftiko: "1.0.0-alpha1"

info:
  label: "Uber Riders API"
  description: "REST API for requesting rides, getting estimates, viewing history, and managing saved places on behalf of Uber riders."
  tags:
    - Uber
    - Ride-Sharing
    - Transportation
    - Riders
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UBER_RIDERS_ACCESS_TOKEN: UBER_RIDERS_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: uber-riders
      baseUri: https://api.uber.com/v1.2
      description: "Uber Riders API for ride requests, products, and estimates."
      authentication:
        type: bearer
        token: "{{UBER_RIDERS_ACCESS_TOKEN}}"
      resources:
        - name: products
          path: /products
          description: "Uber product types available at a location."
          operations:
            - name: list-products
              method: GET
              description: "Returns information about the Uber products offered at a given location."
              inputParameters:
                - name: latitude
                  in: query
                  type: number
                  required: true
                  description: "Latitude component of location."
                - name: longitude
                  in: query
                  type: number
                  required: true
                  description: "Longitude component of location."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: product
          path: /products/{product_id}
          description: "Specific Uber product details."
          operations:
            - name: get-product
              method: GET
              description: "Returns information about a specific Uber product."
              inputParameters:
                - name: product_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for the product."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: price-estimates
          path: /estimates/price
          description: "Price estimates for ride products."
          operations:
            - name: get-price-estimates
              method: GET
              description: "Returns an estimated price range for each product between two locations."
              inputParameters:
                - name: start_latitude
                  in: query
                  type: number
                  required: true
                  description: "Start location latitude."
                - name: start_longitude
                  in: query
                  type: number
                  required: true
                  description: "Start location longitude."
                - name: end_latitude
                  in: query
                  type: number
                  required: true
                  description: "End location latitude."
                - name: end_longitude
                  in: query
                  type: number
                  required: true
                  description: "End location longitude."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: time-estimates
          path: /estimates/time
          description: "ETA estimates for ride products."
          operations:
            - name: get-time-estimates
              method: GET
              description: "Returns ETAs for all products offered at a given location."
              inputParameters:
                - name: start_latitude
                  in: query
                  type: number
                  required: true
                  description: "Start location latitude."
                - name: start_longitude
                  in: query
                  type: number
                  required: true
                  description: "Start location longitude."
                - name: product_id
                  in: query
                  type: string
                  required: false
                  description: "Filter by product ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: rider-profile
          path: /me
          description: "Authenticated rider profile."
          operations:
            - name: get-rider-profile
              method: GET
              description: "Returns the authenticated rider's Uber profile."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: ride-history
          path: /history
          description: "Rider's trip history."
          operations:
            - name: get-ride-history
              method: GET
              description: "Returns the rider's lifetime activity with Uber."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of items to return."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: ride-requests
          path: /requests
          description: "Ride request management."
          operations:
            - name: create-ride-estimate
              method: POST
              description: "Get an upfront fare estimate before booking a ride."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  product_id: "{{tools.product_id}}"
                  start_latitude: "{{tools.start_latitude}}"
                  start_longitude: "{{tools.start_longitude}}"
                  end_latitude: "{{tools.end_latitude}}"
                  end_longitude: "{{tools.end_longitude}}"
            - name: create-ride-request
              method: POST
              description: "Request a ride on behalf of an Uber user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  product_id: "{{tools.product_id}}"
                  start_latitude: "{{tools.start_latitude}}"
                  start_longitude: "{{tools.start_longitude}}"
                  end_latitude: "{{tools.end_latitude}}"
                  end_longitude: "{{tools.end_longitude}}"
                  fare_id: "{{tools.fare_id}}"

        - name: ride-request
          path: /requests/{request_id}
          description: "Individual ride request operations."
          operations:
            - name: get-ride-request
              method: GET
              description: "Get real-time status of an ongoing trip."
              inputParameters:
                - name: request_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for the ride request."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: cancel-ride-request
              method: DELETE
              description: "Cancel an ongoing ride request."
              inputParameters:
                - name: request_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for the ride request."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
