naftiko: "1.0.0-alpha1"

info:
  label: "Uber Drivers API"
  description: "API for accessing driver partner profiles, payment history, and trip records."
  tags:
    - Uber
    - Drivers
    - Transportation
    - Payments
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UBER_DRIVERS_ACCESS_TOKEN: UBER_DRIVERS_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: uber-drivers
      baseUri: https://api.uber.com/v1
      description: "Uber Drivers API for partner profile, payments, and trip data."
      authentication:
        type: bearer
        token: "{{UBER_DRIVERS_ACCESS_TOKEN}}"
      resources:
        - name: driver-profile
          path: /partners/me
          description: "Driver partner profile."
          operations:
            - name: get-driver-profile
              method: GET
              description: "Returns information about the authenticated driver partner."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: driver-payments
          path: /partners/payments
          description: "Driver payment history."
          operations:
            - name: get-driver-payments
              method: GET
              description: "Returns a list of payments made to the driver."
              inputParameters:
                - name: from_time
                  in: query
                  type: integer
                  required: false
                  description: "Start of query time range (Unix timestamp)."
                - name: to_time
                  in: query
                  type: integer
                  required: false
                  description: "End of query time range (Unix timestamp)."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of items to return."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: driver-trips
          path: /partners/trips
          description: "Driver trip history."
          operations:
            - name: get-driver-trips
              method: GET
              description: "Returns trip history for the authenticated driver partner."
              inputParameters:
                - name: from_time
                  in: query
                  type: integer
                  required: false
                  description: "Start of query time range (Unix timestamp)."
                - name: to_time
                  in: query
                  type: integer
                  required: false
                  description: "End of query time range (Unix timestamp)."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of items to return."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
