naftiko: 1.0.0-alpha2
info:
  label: Uber Eats API — Reporting
  description: 'Uber Eats API — Reporting. 1 operations. Lead operation: Generate Report. Self-contained Naftiko capability
    covering one Uber business surface.'
  tags:
  - Uber
  - Reporting
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UBER_API_KEY: UBER_API_KEY
capability:
  consumes:
  - type: http
    namespace: eats-reporting
    baseUri: https://api.uber.com/v1
    description: Uber Eats API — Reporting business capability. Self-contained, no shared references.
    resources:
    - name: eats-reports
      path: /eats/reports
      operations:
      - name: generatereport
        method: POST
        description: Generate Report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.UBER_API_KEY}}'
  exposes:
  - type: rest
    namespace: eats-reporting-rest
    port: 8080
    description: REST adapter for Uber Eats API — Reporting. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/eats/reports
      name: eats-reports
      description: REST surface for eats-reports.
      operations:
      - method: POST
        name: generatereport
        description: Generate Report
        call: eats-reporting.generatereport
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: eats-reporting-mcp
    port: 9090
    transport: http
    description: MCP adapter for Uber Eats API — Reporting. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: generate-report
      description: Generate Report
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: eats-reporting.generatereport
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
