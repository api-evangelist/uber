naftiko: 1.0.0-alpha2
info:
  label: Uber Vouchers API — Codes
  description: 'Vouchers — Codes. 3 operations. Lead operation: Generate Voucher Codes. Self-contained Naftiko capability
    covering one Uber business surface.'
  tags:
  - Uber
  - Vouchers
  - Codes
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    UBER_API_TOKEN: UBER_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: vouchers-codes
    baseUri: https://api.uber.com/v1
    description: Uber Vouchers API — Codes business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.UBER_API_TOKEN}}'
    resources:
    - name: voucher-programs-program-id-codes-generate
      path: /voucher-programs/{program_id}/codes/generate
      operations:
      - name: generateVoucherCodes
        method: POST
        description: Generate Voucher Codes
        inputParameters:
        - name: program_id
          in: path
          type: string
          required: true
          description: program_id
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: voucher-programs-program-id-codes
      path: /voucher-programs/{program_id}/codes
      operations:
      - name: listVoucherCodes
        method: GET
        description: List Voucher Codes
        inputParameters:
        - name: program_id
          in: path
          type: string
          required: true
          description: program_id
        - name: limit
          in: query
          type: integer
          required: false
          description: limit
        - name: offset
          in: query
          type: integer
          required: false
          description: offset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: voucher-programs-program-id-codes-distribute
      path: /voucher-programs/{program_id}/codes/distribute
      operations:
      - name: distributeVoucherCodes
        method: POST
        description: Distribute Voucher Codes
        inputParameters:
        - name: program_id
          in: path
          type: string
          required: true
          description: program_id
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: vouchers-codes-rest
    port: 8080
    description: REST adapter for Uber Vouchers API — Codes. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/voucher-programs/{program-id}/codes/generate
      name: voucher-programs-program-id-codes-generate
      description: REST surface for voucher-programs-program-id-codes-generate.
      operations:
      - method: POST
        name: generateVoucherCodes
        description: Generate Voucher Codes
        call: vouchers-codes.generateVoucherCodes
        with:
          program_id: rest.program_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/voucher-programs/{program-id}/codes
      name: voucher-programs-program-id-codes
      description: REST surface for voucher-programs-program-id-codes.
      operations:
      - method: GET
        name: listVoucherCodes
        description: List Voucher Codes
        call: vouchers-codes.listVoucherCodes
        with:
          program_id: rest.program_id
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/voucher-programs/{program-id}/codes/distribute
      name: voucher-programs-program-id-codes-distribute
      description: REST surface for voucher-programs-program-id-codes-distribute.
      operations:
      - method: POST
        name: distributeVoucherCodes
        description: Distribute Voucher Codes
        call: vouchers-codes.distributeVoucherCodes
        with:
          program_id: rest.program_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vouchers-codes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Uber Vouchers API — Codes. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: generate-voucher-codes
      description: Generate Voucher Codes
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vouchers-codes.generateVoucherCodes
      with:
        program_id: tools.program_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-voucher-codes
      description: List Voucher Codes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vouchers-codes.listVoucherCodes
      with:
        program_id: tools.program_id
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: distribute-voucher-codes
      description: Distribute Voucher Codes
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vouchers-codes.distributeVoucherCodes
      with:
        program_id: tools.program_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
