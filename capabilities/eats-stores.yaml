naftiko: 1.0.0-alpha2
info:
  label: Uber Eats API — Stores
  description: 'Food Delivery — Stores. 4 operations. Lead operation: List Stores. Self-contained Naftiko capability covering
    one Uber business surface.'
  tags:
  - Uber
  - Food Delivery
  - Stores
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    UBER_API_TOKEN: UBER_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: eats-stores
    baseUri: https://api.uber.com/v1
    description: Uber Eats API — Stores business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.UBER_API_TOKEN}}'
    resources:
    - name: eats-stores
      path: /eats/stores
      operations:
      - name: listStores
        method: GET
        description: List Stores
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Number of stores to return.
        - name: offset
          in: query
          type: integer
          required: false
          description: Offset for pagination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: eats-stores-store-id
      path: /eats/stores/{store_id}
      operations:
      - name: getStore
        method: GET
        description: Get Store
        inputParameters:
        - name: store_id
          in: path
          type: string
          required: true
          description: Unique identifier for the store.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: eats-stores-store-id
      path: /eats/stores/{store_id}
      operations:
      - name: updateStore
        method: PATCH
        description: Update Store
        inputParameters:
        - name: store_id
          in: path
          type: string
          required: true
          description: Unique identifier for the store.
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: eats-stores-store-id-status
      path: /eats/stores/{store_id}/status
      operations:
      - name: updateStoreStatus
        method: PUT
        description: Update Store Status
        inputParameters:
        - name: store_id
          in: path
          type: string
          required: true
          description: Unique identifier for the store.
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: eats-stores-rest
    port: 8080
    description: REST adapter for Uber Eats API — Stores. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/eats/stores
      name: eats-stores
      description: REST surface for eats-stores.
      operations:
      - method: GET
        name: listStores
        description: List Stores
        call: eats-stores.listStores
        with:
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eats/stores/{store-id}
      name: eats-stores-store-id
      description: REST surface for eats-stores-store-id.
      operations:
      - method: GET
        name: getStore
        description: Get Store
        call: eats-stores.getStore
        with:
          store_id: rest.store_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateStore
        description: Update Store
        call: eats-stores.updateStore
        with:
          store_id: rest.store_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eats/stores/{store-id}/status
      name: eats-stores-store-id-status
      description: REST surface for eats-stores-store-id-status.
      operations:
      - method: PUT
        name: updateStoreStatus
        description: Update Store Status
        call: eats-stores.updateStoreStatus
        with:
          store_id: rest.store_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: eats-stores-mcp
    port: 9090
    transport: http
    description: MCP adapter for Uber Eats API — Stores. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-stores
      description: List Stores
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: eats-stores.listStores
      with:
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: get-store
      description: Get Store
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: eats-stores.getStore
      with:
        store_id: tools.store_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-store
      description: Update Store
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: eats-stores.updateStore
      with:
        store_id: tools.store_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-store-status
      description: Update Store Status
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: eats-stores.updateStoreStatus
      with:
        store_id: tools.store_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
