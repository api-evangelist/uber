naftiko: 1.0.0-alpha2
info:
  label: Uber Eats API — Stores
  description: 'Uber Eats API — Stores. 4 operations. Lead operation: List Stores. Self-contained Naftiko capability covering
    one Uber business surface.'
  tags:
  - Uber
  - Stores
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UBER_API_KEY: UBER_API_KEY
capability:
  consumes:
  - type: http
    namespace: eats-stores
    baseUri: https://api.uber.com/v1
    description: Uber Eats API — Stores business capability. Self-contained, no shared references.
    resources:
    - name: eats-stores
      path: /eats/stores
      operations:
      - name: liststores
        method: GET
        description: List Stores
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Number of stores to return.
        - name: offset
          in: query
          type: integer
          description: Offset for pagination.
    - name: eats-stores-store_id
      path: /eats/stores/{store_id}
      operations:
      - name: getstore
        method: GET
        description: Get Store
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: store_id
          in: path
          type: string
          description: Unique identifier for the store.
          required: true
      - name: updatestore
        method: PATCH
        description: Update Store
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: store_id
          in: path
          type: string
          description: Unique identifier for the store.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: eats-stores-store_id-status
      path: /eats/stores/{store_id}/status
      operations:
      - name: updatestorestatus
        method: PUT
        description: Update Store Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: store_id
          in: path
          type: string
          description: Unique identifier for the store.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.UBER_API_KEY}}'
  exposes:
  - type: rest
    namespace: eats-stores-rest
    port: 8080
    description: REST adapter for Uber Eats API — Stores. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/eats/stores
      name: eats-stores
      description: REST surface for eats-stores.
      operations:
      - method: GET
        name: liststores
        description: List Stores
        call: eats-stores.liststores
        with:
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eats/stores/{store-id}
      name: eats-stores-store-id
      description: REST surface for eats-stores-store_id.
      operations:
      - method: GET
        name: getstore
        description: Get Store
        call: eats-stores.getstore
        with:
          store_id: rest.store_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatestore
        description: Update Store
        call: eats-stores.updatestore
        with:
          store_id: rest.store_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eats/stores/{store-id}/status
      name: eats-stores-store-id-status
      description: REST surface for eats-stores-store_id-status.
      operations:
      - method: PUT
        name: updatestorestatus
        description: Update Store Status
        call: eats-stores.updatestorestatus
        with:
          store_id: rest.store_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: eats-stores-mcp
    port: 9090
    transport: http
    description: MCP adapter for Uber Eats API — Stores. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-stores
      description: List Stores
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: eats-stores.liststores
      with:
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: get-store
      description: Get Store
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: eats-stores.getstore
      with:
        store_id: tools.store_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-store
      description: Update Store
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: eats-stores.updatestore
      with:
        store_id: tools.store_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-store-status
      description: Update Store Status
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: eats-stores.updatestorestatus
      with:
        store_id: tools.store_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
