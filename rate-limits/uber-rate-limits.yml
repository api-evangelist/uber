specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Uber
providerId: uber
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Ride-Sharing
  - Food Delivery
  - Logistics
  - Rate Limiting
description: Uber's developer documentation does not publish numeric API rate limits on its public-facing
  pages. Access is gated to Uber for Business Enterprise clients and to specific Uber Eats / Uber Direct
  partner programs; throttling, quotas, and SLAs are governed by the partner agreement and on-boarding
  package rather than a public rate-limits page.
notes: No public per-API rate-limit numbers are documented. Reconciled remains false until the partner
  developer guide can be referenced inside an active enterprise agreement.
sources:
  - https://developer.uber.com/docs/businesses
responseCodes:
  throttled: 429
limits:
  - name: Partner-Contract Rate Limit
    scope: account
    metric: varies
    limit: see partner / enterprise agreement
    notes: Documentation states API access is restricted to enterprise clients; per-endpoint quotas are
      not published.
policies:
  - name: Enterprise Gating
    description: Uber for Business APIs (Receipts, SFTP automation, SCIM, SAP Concur, SSO) require an
      enterprise account before access is granted; on-boarding includes the operative throttling thresholds.
  - name: Backoff
    description: Apply exponential backoff with jitter on transient errors; respect any Retry-After header
      returned by Uber's edge.
maintainers:
