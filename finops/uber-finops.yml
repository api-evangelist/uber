specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Uber
providerId: uber
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Ride-Sharing
  - Food Delivery
  - Logistics
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Uber: enterprise / partner-gated developer APIs with no public
  pricing. Spend is contract-driven (per-trip, per-delivery, platform fees) and surfaced via Uber for
  Business reporting rather than a public usage-meter API.'
notes: Uber developer access is enterprise-only; FOCUS columns and meters are best-effort placeholders
  pending reconciliation against an actual Uber for Business invoice.
sources:
  - https://developer.uber.com/docs/businesses
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Uber Technologies, Inc.
serviceCategory: Mobility / Logistics
billingModel:
  pricingCategory: Custom Contract
  billingFrequency: Monthly
  billingCurrency: USD (settlement varies)
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Refund
    - Adjustment
focusColumns:
  ServiceName: Uber for Business / Uber Direct
  ServiceCategory: Mobility / Logistics
  ProviderName: Uber
  PublisherName: Uber Technologies, Inc.
  InvoiceIssuerName: Uber Technologies, Inc.
  BillingCurrency: USD
meters:
  - name: trips
    description: Completed Uber for Business / Guest Rides trips
    unit: trip
    aggregation: sum
    dimensions:
      - city
      - product
  - name: deliveries
    description: Completed Uber Eats / Uber Direct deliveries
    unit: delivery
    aggregation: sum
    dimensions:
      - city
      - merchant
  - name: vouchers_issued
    description: Vouchers issued via the Vouchers API
    unit: voucher
    aggregation: sum
principles:
  - name: Visibility
    description: Pull spend from the Uber for Business dashboard, the Receipts API, and SFTP data automation
      drops; there is no public usage-API for self-service tracking.
  - name: Allocation
    description: Allocate trips and deliveries to internal cost centers using Uber for Business expense
      groups, custom fields, and SAP Concur integration.
  - name: Optimization
    description: Use product mix (UberX vs UberXL vs Uber Direct service levels) and policy controls
      to manage per-trip / per-delivery cost; consolidate vouchers under a single program where possible.
  - name: Accountability
    description: Travel managers and ops owners review Uber for Business reporting; finance reconciles
      against the monthly enterprise invoice.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
