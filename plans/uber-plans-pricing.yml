specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Uber
providerId: uber
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Ride-Sharing
  - Rides
  - Transportation
  - Food Delivery
  - Logistics
description: Uber's enterprise-facing developer APIs (Uber for Business, Uber Eats, Uber Direct, Guest
  Rides, Vouchers) are gated behind enterprise / partner agreements. Per the developer documentation,
  "Access to the API is only available for Uber for Business Enterprise clients." There is no public
  per-API price sheet, free self-service tier, or published per-call rate card.
notes: developer.uber.com explicitly restricts API access to Uber for Business Enterprise clients ("Please
  reach out to our team for more information and to get access"). No public pricing is published, so
  the scaffold is trimmed to a single Contact Sales plan.
sources:
  - https://developer.uber.com/docs/businesses
plans:
  - id: uber-contact-sales
    name: Contact Sales (Enterprise / Partner)
    type: enterprise
    description: All Uber developer API access is enterprise-gated. Pricing, quotas, and SLAs are negotiated
      under a partner / Uber for Business agreement; per-trip, per-delivery, and platform fees are determined
      by the contract.
    entries:
      - label: Custom Contract
        name: custom_contract
        type: flat
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Uber for Business Enterprise Access
      - name: Receipts API
      - name: SCIM Provisioning
      - name: SSO Integration
      - name: Uber Eats / Direct Partner APIs
